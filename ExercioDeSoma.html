<!DOCTYPE html>
<html>
  <head>

    <title> javascript</title>
    <meta charset="UTF-8"/>

    <script>
      
      // Passo 1 - Entrada de dados

       const n1 = parseInt(prompt("Digite o número 1"))
       const n2 = parseInt(prompt("Digite o número 2"))

       // Passo 2 - processamento
       const soma = n1 + n2 // pode ser feito tbm como parseFloat(n1) + parseFloat(n2), em vez de por o código no prompt

       // " para o comentario de multiplas linhas é "/ *"
       //o operador + serve tanto para somar quanto para concatenar (quando é texto ele concatena) caso seja o número intero ele soma direto
       

       // Passo 3 - Saída
       
       console.log(" A soma é" +soma)
     


    </script>
  </head>

</html>
