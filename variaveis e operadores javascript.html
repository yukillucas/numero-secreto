<!DOCTYPE html>
<html>
  <head>

    <title> javascript</title>
    <meta charset="UTF-8"/>

    <script>
        
        // frases string 
        

        const n1 = 10
        const n2 = 11
        const aprovado = true
        const minimo = 9

     // operadores
     console.log("opreadores atitmeticos")
     console.log(n1+n2)
     console.log(n1-n2)
     console.log(n1*n2)
     console.log(n1/n2)
     console.log(n1%n2)
     
     // segundo operador

      console.log("operadores relacionais")
      console.log( n1 == n2) // 2 iguais para saber se é igual
      console.log( n1 != n2) // ! é diferente
      console.log( n1 > n2)
      console.log( n1 < n2)
      console.log( n1 >= n2)
      console.log( n1 <= n2)

        console.log("operadores logicos")
        console.log(aprovado)
        console.log(!aprovado)
        console.log( n2 >= 7 && n2 >= minimo) // && para se juntar duas variaveis em uma só aplicação
        console.log( n2 >= 7 || n2 >= minimo) // || serve como (ou) em duas variaveis




     





    </script>
  </head>

</html>
