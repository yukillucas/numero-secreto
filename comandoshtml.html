<!DOCTYPE html>
<html>
  <head>

    <title> javascript</title>
    <meta charset="UTF-8"/>

    <script>
        inputtype="text" // comando para tipos de texto, button para butão
        br // comando para quebrar linha e fazer descer, o BR precisa esta dentro do <>
        onclick= // chama a função que está sendo clicado
        getElementById // pega todo o elemento do id mencionado
        value= // para dar valor inicial a uma frase, resumindo a linha já começa com o testo que quiser
        innerHTML // usado quando o value existe texto fora a parte
        if // por uma condição, tudo dentro do () é a condição e tudo dentro do {} é oque acontece caso a condição seja feita
        else // todo o resto que tiver fora da condição do if
        else if // por uma condição dentro do else
      
    </script>
  </head>
