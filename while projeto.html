<meta charset="UTF-8"/>
   <script>
    let numero = 1;

    while (numero <= 10) {
      alert(numero);
      numero++
    }
    
// outro exemplo

let numero = 10;

    while (numero >= 0) {
      alert(numero);
      numero--
    }

    // outro exemplo mais complexo
    
    let numero = prompt("Qual o número?");
    let contador = 0;

    while (contador <= numero) { 
      alert(contador);
      contador++;
    }

    </script>
